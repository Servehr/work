<aside 
   class="w-full"
>
  @for (item of menuItems(); track $index+10) 
  {
    
     <div 
        class="sticky top-0 bg-[#3e4095] hover:bg-gray-600 px-2 py-3 text-white w-full border border-b-1"
     >
       <a 
         [routerLink]="item.path" 
         routerLinkActive="active"
         class="text-left p-3 w-12/12"
       >
         <span 
           class="icon"
         >
           {{ item.icon }}
         </span>
         <span 
           class="label"
         >
           {{ item.label }}
         </span>
        </a> 
     </div>
    
     
  }
    
</aside>
