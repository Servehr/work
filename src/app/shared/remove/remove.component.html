<div 
   class='container mx-auto mt-1 md:mt-1 mb-7 flex-col md:flex border-2'
>
    <div 
      class="w-12/12 md:w-12/12 min-h-fit px-2 py-1 md:p-5 flex-cols px-4"
    >
       <p
        class="text-gray-700 mb-7 w-full text-lg font-bold text-red-700 flex justify-center items-center"
       >
         <ng-content></ng-content>
       </p>

       <div 
           class="flex justify-center items-center space-x-5"
       >
         <app-botin
           (sendData)="closeModal()"
           class="bg-black rounded-md text-gray-200 hover:bg-gray-700"
         >
           Cancel
         </app-botin>
         <app-botin
           (ChangeOnButtonHoverIn)="ChangeOnButtonHoverIn()" 
           (ChangeOnButtonHoverOut)="ChangeOnButtonHoverOut()"
           (sendData)="remove()"
           [style]="style"
           (click)="remove()"
         >
           @if(isLoading() === true)
           {
             <p class="font-bold text-white"> ... deleting </p>
           }
           @if(isLoading() === false)
           {
             <h3>Remove</h3>
           }
         </app-botin>
       </div>  

    </div>
</div>
