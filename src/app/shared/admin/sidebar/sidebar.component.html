<div 
    class="px-5 py-5 flex bg-white justify-between md:justify-center items-center -ml-1"
>    
    <app-logo></app-logo>

    <div 
        class="md:hidden"
    >
       <ng-icon 
         [svg]="closeMobileMenu" 
         [size]="'25'" 
         [color]="'#3e4095'" 
         (click)="harmburger()"
         [ngClass]="{'circle-over' : isHamburgOver}"
         class="cursor-pointer"
         [ngStyle]="style"
       />
    </div>
</div>

<app-placard
  [imageStyle]="imageStyle"
>
</app-placard>
