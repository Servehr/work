<div 
  class="flex md:flex-cols gap-5 md:gap-0 md:justify-between"
>
  <div 
    class="w-full flex-col mb-3 gap-5"
  >
    <ng-content></ng-content>

    <div 
      class="relative border-2 flex-col border-2 w-full rounded-lg shadow-lg bg-cover bg-top object-cover object-fit mt-1 justify-center items-center cursor-pointer hover:text-green-300 uploader"
    >  
       <div 
         appDragDrop
         [uploadType]="uploadType"
         (dropFile)="dropFile($event)"
         class="dropzone flex p-3 h-[200px] w-full flex mx-auto"  
         (click)="selectFile.click()"    
       >
         <div 
           class="w-full flex justify-center items-center text-sm"
         >
           <p 
             class="text-[12px]"
           >
             Drag and drop a file or 
             <a 
               class="cursor-pointer text-blue-700 font-bold"
               (click)="selectFile.click()"
             >
               Browse
             </a>
               for a file
           </p>
         </div>
        </div>
          
        <input 
          multiple
          #selectFile
          (change)="onFileSelectedChange($event)"
          type='file' 
          id='multiple_upload' 
          name='multiple_upload' 
          class='hidden'
          multiple
        />

      </div>

      <div 
          class="grid md:grid-cols-12 gap-5 pt-3 mt-10"
        >
          @if(multiplePreview.length > 0)
          {
             @for(imagePreveiw of multiplePreview; track imagePreveiw; let position = $index)
             {
                <div 
                  class="relative col-span-4 md:col-span-6"
                  [ngClass]="(position === mainImagePosition) ? 'col-span-3 z-30 border border-4 p-1 h-23 relative border-green bg-green-400' : 'col-span-3  z-30 border border-2 h-23 relative'"
                >
                  <app-image
                   [src]="imagePreveiw"
                   [alt]="'alt'"
                   [width]="800"
                   [height]="800"
                   [style]="imageStyle"
                  >
                  </app-image>
                  <div 
                    class="absolute flex justify-between bottom-0 w-full"
                  >
                    <span 
                      class="rounded-sm border border-1 left-0 border-green-900 p-1 bg-blue-200 delete cursor-pointer hover:bg-orange-200" 
                      (click)="handleDeleteImage(position)"
                    >
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="red" class="w-4 h-4">
                        <path fillRule="evenodd" d="M16.5 4.478v.227a48.816 48.816 0 0 1 3.878.512.75.75 0 1 1-.256 1.478l-.209-.035-1.005 13.07a3 3 0 0 1-2.991 2.77H8.084a3 3 0 0 1-2.991-2.77L4.087 6.66l-.209.035a.75.75 0 0 1-.256-1.478A48.567 48.567 0 0 1 7.5 4.705v-.227c0-1.564 1.213-2.9 2.816-2.951a52.662 52.662 0 0 1 3.369 0c1.603.051 2.815 1.387 2.815 2.951Zm-6.136-1.452a51.196 51.196 0 0 1 3.273 0C14.39 3.05 15 3.684 15 4.478v.113a49.488 49.488 0 0 0-6 0v-.113c0-.794.609-1.428 1.364-1.452Zm-.355 5.945a.75.75 0 1 0-1.5.058l.347 9a.75.75 0 1 0 1.499-.058l-.346-9Zm5.48.058a.75.75 0 1 0-1.498-.058l-.347 9a.75.75 0 0 0 1.5.058l.345-9Z" clipRule="evenodd" />
                      </svg>
                    </span>
                    <span 
                      class="rounded-sm border border-1 right-0 border-green-900 p-1 bg-blue-200 delete cursor-pointer hover:bg-orange-200"
                      (click)="mainImagePosition = position"
                    >
                      <div 
                        className="p-1 bg-blue-700 hover:bg-blue-900 text-white hover:font-bold" 
                        [ngStyle]="fontStyle"
                      >
                        Make as Main Image
                      </div>
                    </span>

                   </div>
                </div>
             } 
          } 
        </div>
    </div>
</div>
