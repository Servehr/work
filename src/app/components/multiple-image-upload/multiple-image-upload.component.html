<div 
  class="flex md:flex-cols gap-5 md:gap-0 md:justify-between"
>
  <div 
    class="w-full flex-col mb-3 gap-5"
  >
    <ng-content></ng-content>

    <div 
      class="relative flex-col border-2 w-full rounded-lg shadow-lg bg-cover bg-top object-cover object-fit mt-1 justify-center items-center cursor-pointer hover:text-green-300 uploader"
    >  
      @if(imageUpload.length === 0)
      {
         <div 
           appDragDrop
           (dropFile)="dropFile($event)"
           class="dropzone flex p-3 h-[200px] w-full flex mx-auto"  
           (click)="selectFile.click()"    
         >
           <div 
             class="w-full flex justify-center items-center text-sm"
           >
             <p 
               class="text-[12px]"
             >
               Drag and drop a file or 
               <a 
                class="cursor-pointer text-blue-700 font-bold"
                (click)="selectFile.click()"
               >
                 Browse
               </a>
               for a file
             </p>
           </div>
          </div>
        }
        <input 
          multiple
          #selectFile
          (change)="onFileSelectedChange($event)"
          type='file' 
          id='passport' 
          name='passport' 
          class='hidden'
          multiple
        />

        <div 
          appDragDrop
          class="relative object-cover z-40 mx-auto flex justify-center items-center"
          (click)="selectFile.click()"
          (dropFile)="dropFile($event)"
        >
          @if(imageUpload.length > 0)
          { 
            @for(image of imageUpload; track image.key)
            {
              <!-- <app-image
               [src]="imageUpload[0]"
               [alt]="'alt'"
               [height]="280"
               [width]="280"
               [style]="imageStyle"
              >
              </app-image> -->
            }
          }            
        </div>
        @if(imageUpload.length > 0)
        {
          <div 
            class="mt-3 absolute top-0 left-0 ml-10 w-fit text-right text-red-600 z-50 bg-white py-1 px-2 hover:bg-yellow-100 rounded-full"
          >
           <ng-icon 
             [svg]="deleteIcon" 
             [size]="'15'" 
             [color]="'red'"
             (click)="removeImages('upload')"
           />
          </div>
        } 
      </div>
    </div>
</div>
