<button 
    class="w-full px-4 py-3 text-sm font-semibold text-white transition-colors duration-300 hover:text-red-200
                   rounded-md shadow focus:outline-red focus:ring-blue-200 focus:ring-4 cursor-pointer" 
    (click)="submit()"
    [disabled]="disabled"
    [ngStyle]="style"
    (mouseover)="ChangeOnHoverIn()"
    (mouseout)="ChangeOnHoverOut()"
>
    <ng-content></ng-content>
</button>
