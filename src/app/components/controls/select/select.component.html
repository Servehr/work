<div 
    class="relative border border-gray-300 text-gray-800 bg-white shadow-lg"
>
    <select
        (change)="onChange($event)"
        [disabled]="disabled"
        [name]="name"
        [title]="title"
        [value]="value"
        class="text-gray-400 bg-white px-3 py-4 transition-all cursor-pointer hover:border-blue-600/30 border border-gray-200 rounded-none outline-blue-600/50 appearance-none invalid:text-black/30 w-full"
    >
        <option
            [id]="-1"
            [value]="-1"
        >
            {{ title }}
        </option>
        @for(option of options;  track option.id)
        {
           <option
             [id]="option.id"
             [value]="option.id"
             [selected]="option.id === value"
             [ngStyle]="style"
           >
             {{ option.name }}
           </option>
        }
    </select>
    <div 
        class="pointer-events-none absolute right-0 top-0 bottom-0 flex items-center px-2 text-gray-700"
    >
        <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
            <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" />
        </svg>
    </div>
</div>

<app-select-option-validation 
   [customErrorMessages]="customErrorMessages" 
   [errors]="control.errors"
>
</app-select-option-validation>
