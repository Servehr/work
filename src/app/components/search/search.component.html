<div 
    class='col-span-7 relative'
>
    <form 
        [formGroup]="suggestForm"
    >
        <input  
            type="text" 
            name="search" 
            id="search" 
            class="block w-full rounded-md border-0 pl-7 pt-3 pb-4 pr-20 text-gray-900 ring-1 ring-inset 
                        ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset 
                        focus:ring-slate-200 sm:text-sm sm:leading-6" 
            placeholder="Search ..."
            formControlName="typeKey"
            [(value)]="keyword"
            ngModel
        />
    </form>
      <div  
         *ngIf="isSearching === true && status === 0"
         class="bg-white absolute border-2 w-full z-50 h-fit px-6 py-4 drop-shadow-xl flex justify-center items-center"
      >
         <app-loader></app-loader>
      </div>
      <ng-container
        *ngIf="results?.length > 0 && status === 200"
      >
        <div  
            *ngIf="results?.length > 3 && status === 200"           
            class="p-4 absolute bottom-0 right-0 -mt-5 rounded-tr-lg rounded-br-lg text-white bg-[#be9d18] text-center text-sm cursor-pointer hover:bg-[#3e4095]"
        >
           View all {{ keyword.length }} results
        </div>

        <div 
            class="bg-white absolute w-full z-50 h-fit max-h-[500px] flex flex-col overflow-y-auto drop-shadow-xl scrollbar-thin scrollbar-thumb-blue-200 scrollbar-track-red-400 hover:scrollbar-thumb-blue-400"
        >   
          @for(user of results; track user.firstname)
          {
              <div 
                class="py-3 px-2 border-b-2 border-gray-200 hover:bg-blue-100 cursor-pointer text-[15px]"
                (click)="select(user)"
             >
               <p>{{ user.firstname }} {{ user.surname }}</p>
            </div>
          }
        </div>
    </ng-container>
    <div  
       *ngIf="results?.length === 0 && status === 400"
       class="absolute w-full z-50 px-6 pt-2 text-sm font-bold text-red-700 flex justify-center items-center"
    >
        @if(keyword.length > 2)
        {
           <!-- No result found for {{ keyword }} -->
           {{ noResult }}
        }
    </div>
</div>
