<nav 
  class="w-full mx-auto mb-2 flex justify-center items-center py-4 px-2" 
  aria-label="Pagination"
>
  @if(hasPreviousPage())
  {
      <button 
        (click)="show(currentPage()-1)"
        class="rounded-lg flex justify-center items-center cursor-pointer mr-5" 
      >
        <div 
          class="flex items-center justify-center"
        >      
         <svg 
           class="h-5 w-5 text-black" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" hover:fill="blue" aria-hidden="true"
         >
           <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd"></path>
         </svg>
         <span 
           class="font-bold text-[14px] hover:text-blue-700"
         >
           Previous
         </span>
         <!-- <div 
           class="text-black rounded-full"
         >
          <ng-icon 
            [svg]="leftArrow" 
            [size]="'20'" 
            [color]="'red'"
          />
         </div> -->
        </div>
      </button>
  }

  @if(hasNextPage())

     <button 
       (click)="show(currentPage()+1)"

     >

           <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"></path>

        <div
