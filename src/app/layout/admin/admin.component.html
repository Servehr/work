@if(openMobileNav)
{
  <div 
     class='d-flex pb-5 md:hidden fixed z-50 h-screen w-screen lg:hidden bg-black/50 top-0 left-0 duration-500'
     style="z-index: 999;"
  > 
    <div 
       class="grid grid-cols-12"
     >
        <div 
          class="col-span-9 mb-10 bg-[#191b5e] h-screen"
        >
          <app-sidebar [SideBar]="!toggleSideBar" (CloseSideBar)="CloseSideBar()"></app-sidebar>
          
        </div>
        <div 
          class="col-span-3 bg-black opacity-25 blur-sm h-screen"
          (click)="getIt()"
        >
          
        </div>
    </div>
  </div>
}

<!-- bg-[#191b5e] bg-[#ffca0a] -->
<div 
   class='flex'
> 
    <div 
        class="lg:w-1/5 lg:visible relative"
    > 
      <aside 
        class="fixed top-0 left-0 w-1/5 duration-500 h-full hidden lg:block md:block bg-[#191b5e]" 
        aria-label="Sidenav"
      >        
        <div 
          class="overflow-y-auto drop-shadow-xl scrollbar-thin scrollbar-thumb-blue-200 scrollbar-track-red-400 hover:scrollbar-thumb-blue-400 h-full relative dark:bg-gray-800 dark:border-gray-700"
        >
          <div 
            class='static top-0 left-0 right-0'
          >
            <app-sidebar></app-sidebar>
          </div>
        </div>
      </aside>
    </div>
        
    <div 
        class="lg:w-4/5 md:w-4/5 w-full d-flex lg:flex-row relative min-h-screen max-h-fit"
    >
        <div 
            class="w-full"
        >
            <app-header (toggleBar)="OpenSideBar($event)" [toggleSideBarMenu]="toggleSideBar"></app-header>
                                    
            <router-outlet></router-outlet>

            <app-footer></app-footer>

        </div> 
    </div>
                     
</div>
<!-- } -->
