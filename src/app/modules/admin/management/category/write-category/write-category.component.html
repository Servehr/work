<div 
   class='container mx-auto mt-1 md:mt-1 mb-7 flex-col md:flex'
>
    <div 
      class="w-12/12 md:w-12/12 px-2 py-1 md:p-5"
    >
      <p 
        class="text-gray-500 font-bold mb-5 -pl-2"
      >
        {{ title }}
      </p>
      

    <div
    >
    <!-- <app-alert 
      [statusCode]="statusCode" 
      [message]="message"
    >
    </app-alert> -->
    
    </div>
      <form 
          [formGroup]="categoryForm"
          class="flex flex-col space-y-5"
      >
          <div 
            class="flex flex-col space-y-1 text-gray-200"
          >
            <input-field
                [id]="'categoryName'"
                #categoryName
                [name]="'categoryName'"
                [placeholder]="'Enter Category Name'"
                [type]="'categoryName'"
                [value]="''"
                formControlName="categoryName"
                [customErrorMessages]="errorMessages"
            >
            </input-field>
          </div>
          <div 
            class="flex flex-col space-y-1 text-gray-200"
          >
            <input-field
                [id]="'categoryDescription'"
                #categoryDescription
                [name]="'categoryDescription'"
                [placeholder]="'Enter categoryDescription'"
                [type]="'categoryDescription'"
                [value]="''"
                formControlName="categoryDescription"
                [customErrorMessages]="errorMessages"
            >
            </input-field>
          </div>
          <p></p>
          <div 
             class="flex justify-between"
          >
            <app-botin
              (sendData)="closeModal()"
              class="bg-black p-2 rounded-md text-gray-200 hover:bg-gray-700"
            >
              <h3>Cancel </h3>
            </app-botin>
            <app-botin
              (ChangeOnButtonHoverIn)="ChangeOnButtonHoverIn()" 
              (ChangeOnButtonHoverOut)="ChangeOnButtonHoverOut()"
              (sendData)="wrteCategory()"
              [style]="style"
              (click)="write()"
            >
              <div
                class="flex flex-col space-y-1 items-center justify-between"
              >
                @if(isLoading)
                {
                   <p class="font-bold text-white"> ... saving </p>
                }
                @if(!isLoading)
                {
                  <h3>{{buttonName}} </h3>
                }
              </div>
            </app-botin>
          </div>
          

      </form>
   </div>



</div>
