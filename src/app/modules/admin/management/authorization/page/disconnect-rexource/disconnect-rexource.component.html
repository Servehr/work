<div 
   class='container mx-auto mt-1 md:mt-1 mb-7 flex-col md:flex'
>
  <div 
    class="w-12/12 md:w-12/12 px-2 py-1 md:p-5"
  >

    <div 
      class="d-flex-col mb-3 gap-5 w-2/2 text-gray-700"
    >
       <p
         class="mb-5 text-lg text-gray-600"
       >
          Connect Page To Resource
       </p>
       <div 
         class="w-full"
       >
         <p 
           class="font-bold text-gray-400"
         >
           Resource
         </p>
         <app-label>
           Heavy Blessing
         </app-label>
       </div>
       <div 
         class="w-full"
       >
         <p 
           class="font-bold text-gray-400"
         >
           Page
         </p>
         <app-label>
           Heavy Blessing
         </app-label>
       </div>
     </div>

    <div class="p-3"></div>

    <div 
      class="flex justify-between"
    >
      <app-botin
        (sendData)="closeModal()"
        class="bg-black p-2 rounded-md text-gray-200 hover:bg-gray-700"
      >
        <h3>Cancel </h3>
      </app-botin>
      <app-botin
        (ChangeOnButtonHoverIn)="ChangeOnButtonHoverIn()" 
        (ChangeOnButtonHoverOut)="ChangeOnButtonHoverOut()"
        (sendData)="disconnect()"
        [style]="style"
        (click)="write()"
      >
        <div
          class="flex flex-col space-y-1 items-center justify-between"
        >
          @if(isLoading)
          {
            <p class="font-bold text-white"> ... disconnecting </p>
          }
          @if(!isLoading)
          {
            <h3> {{'Disconnect'}} </h3>
          }
         </div>
       </app-botin>
     </div>    

   </div>
</div>
