<div 
  class="px-1 md:px-1"
>
    <div 
        class="grid md:grid-cols-12 grid-cols-6 gap-5 px-2 md:px-5 md:p-3 mt-2 mb-5 justify-center items-center"
    >
      @for(summary of summaries; track summary.text)
      {
        <div 
          class="col-span-3 bg-white"
        >
            <app-pulsate [summaries]="summary" [box]="'true'"></app-pulsate>
        </div>
      }
    </div>
</div>


<div 
   class='container mx-auto px-5'
>
   <div 
     class="w-full flex-cols md:flex gap-2"
   >
     <div 
       class="w-12/12 md:w-6/12 shadow-lg h-[350px] pl-3"
     >
       Graph
     </div>

     <div 
       class="w-12/12 md:w-6/12 shadow-lg h-[350px] pl-3"
     >
        <p 
          class="w-full flex justify-left text-[15px] mt-5 text-gray-500"
        >
          Graph
        </p> 
     </div>

   </div>
</div>
