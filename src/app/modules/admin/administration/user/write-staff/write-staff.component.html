<div 
   class='container mx-auto mt-1 md:mt-1 mb-7 flex-col md:flex'
>
    <div 
      class="w-12/12 md:w-12/12 px-2 py-1 md:p-5"
    >
      <p 
        class="text-gray-500 font-bold mb-5 -pl-2"
      >
        {{ title }}
      </p>
      

    <div
    >
    <!-- <app-alert 
      [statusCode]="statusCode" 
      [message]="message"
    >
    </app-alert> -->
    
    </div>
      <form 
          [formGroup]="staffForm"
          class="flex flex-col space-y-5"
      >
          <div 
            class="w-full md:flex text-gray-200 gap-6 space-y-4 md:space-y-0 justify-center items-center"
          >
            <div 
              class="w-2/2 md:w-1/2"
            >
              <input-field
                [id]="'firstname'"
                #firstname
                [name]="'firstname'"
                [placeholder]="'Enter firstname Name'"
                [type]="'firstname'"
                [value]="''"
                formControlName="firstname"
                [customErrorMessages]="errorMessages"
              >
              </input-field>
            </div>
            <div 
              class="w-2/2 md:w-1/2"
            >
              <input-field
                [id]="'surname'"
                #surname
                [name]="'surname'"
                [placeholder]="'Enter surname'"
                [type]="'surname'"
                [value]="''"
                formControlName="surname"
                [customErrorMessages]="errorMessages"
              >
              </input-field>
            </div>
          </div>

          <div 
            class="w-full md:flex text-gray-200 gap-6 space-y-4 md:space-y-0 justify-center items-center"
          >
            <div 
              class="w-2/2 md:w-1/2"
            >
              <input-field
                [id]="'phoneNumber'"
                #phoneNumber
                [name]="'phoneNumber'"
                [placeholder]="'Enter Phone Number'"
                [type]="'phoneNumber'"
                [value]="''"
                formControlName="phoneNumber"
                [customErrorMessages]="errorMessages"
              >
              </input-field>
            </div>
            <div 
              class="w-2/2 md:w-1/2"
            >
              <input-field
                [id]="'email'"
                #email
                [name]="'email'"
                [placeholder]="'Enter email'"
                [type]="'email'"
                [value]="''"
                formControlName="email"
                [customErrorMessages]="errorMessages"
              >
              </input-field>
            </div>
          </div>

          <div 
            class="w-full md:flex text-gray-200 mb-30"
          >
            <div 
              class="w-2/2 md:w-full"
            >
              <app-select 
                #department
                [id]="'department'"  
                [name]="'department'"  
                [title]="'- Select department -'"
                [options]="departments"
                formControlName="department" 
                [value]="value"
                [customErrorMessages]="errorMessages"
              >         
              </app-select>
            </div>
          </div>

          <div 
             class="flex justify-between"
          >
            <app-botin
              (sendData)="closeModal()"
              class="bg-black p-2 rounded-md text-gray-200 hover:bg-gray-700"
            >
              <h3>Cancel </h3>
            </app-botin>
            <app-botin
              (ChangeOnButtonHoverIn)="ChangeOnButtonHoverIn()" 
              (ChangeOnButtonHoverOut)="ChangeOnButtonHoverOut()"
              (sendData)="wrteCategory()"
              [style]="style"
              (click)="write()"
            >
              <div
                class="flex flex-col space-y-1 items-center justify-between"
              >
                @if(isLoading)
                {
                   <p class="font-bold text-white"> ... saving </p>
                }
                @if(!isLoading)
                {
                  <h3>{{buttonName}} </h3>
                }
              </div>
            </app-botin>
          </div>
          

      </form>
   </div>

</div>
