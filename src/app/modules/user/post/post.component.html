<div 
   class='container mx-auto mt-1 md:mt-1 mb-7 flex-col md:flex'
>
   <div 
      class="w-12/12 md:w-12/12 px-2 py-1 md:p-5"
    >
      <p 
        class="text-gray-500 font-bold mb-5 -pl-2"
      >
        {{ title }}
      </p> 


      <div  
        [formGroup]="postJob"
      >
        <app-suggestion
          [suggest]="result()"
          (divisions)="divisions($event)"
        >
        </app-suggestion>

        <div 
          formArrayName="options"
          class="grid grid-cols-2 md:grid-cols-4 gap-2 mt-2 h-fit max-h-[600px] overflow-y-auto drop-shadow-xl scrollbar-thin scrollbar-thumb-blue-200 scrollbar-track-red-400 hover:scrollbar-thumb-blue-400"
        >

          @for(opt of options.controls; track opt; let i = $index)
          {
            <div 
              class="w-full px-5 py-3 text-black shadow-lg mb-2 d-flex justify-center items-center"
            >
              <div 
                class="flex justify-center items-center"
                (click)="selectDivision(opt.value._id)"
              >
                <app-check
                  [id]="'division'"  
                  [name]="'division'"
                  #optn                    
                  [formGroupName]="i"
                >
                  <!-- {{ opt.value.name }} -->
                </app-check>
              </div>
              <p
                class="mt-1 w-full text-center"
              >
                {{ opt.value.name }}
              </p>
            </div>
          }              
          <!-- <div 
            *ngFor="let opt of options.controls; let i=index"
          >
            {{ opt.value }}
            <input type="checkbox" [formControlName]="i" class="border-2 border-red-200 p-10 rounded-full">
          </div> -->
        </div>


         <div 
            class="flex flex-col space-y-1 text-gray-200"
         >
           <app-text-area  
              placeholder="Leave description"
              [rows]="rows"
              [cols]="cols"
              formControlName="jobInformation"
              [customErrorMessages]="errorMessages"
            >
           </app-text-area>
         </div>
         
         <div 
           class="flex justify-between mt-5"
         >
            <app-botin
              (sendData)="closeModal()"
              class="bg-black p-2 rounded-md text-gray-200 hover:bg-gray-700"
            >
              <h3>Cancel </h3>
            </app-botin>
            <app-botin
              (ChangeOnButtonHoverIn)="ChangeOnButtonHoverIn()" 
              (ChangeOnButtonHoverOut)="ChangeOnButtonHoverOut()"
              (sendData)="sendIt()"
              [style]="style"
            >
              <div
                class="flex flex-col space-y-1 items-center justify-between"
              >
                @if(isLoading)
                {
                  <p class="font-bold text-white"> ... saving </p>
                }
                @if(!isLoading)
                {
                  <h3>Post</h3>
                }
              </div>
            </app-botin>
          </div>        
    </div>




    </div>
</div>
