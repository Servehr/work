<div 
  class="relative d-flex justify-center items-center mx-auto w-9/12 md:w-4/12 mb-80 rounded-lg bg-cover bg-top object-cover object-fit mt-20 cursor-pointer hover:text-green-300"
>
  <app-image-upload
    (sendFile)="saveFile($event, 'passport')"
  >
    <p 
      class="text-gray-800 text-md w-full flex mb-5 mx-auto justify-center items-center"
    >
      Upload Passport Photograph
    </p>
  </app-image-upload>  

   <div 
     class="md:flex mb-3 w-2/2 text-gray-700 mt-10"
   >
      <app-botin
        (sendData)="closeModal()"
        class="bg-blue-900 p-2 rounded-md text-gray-200 hover:bg-yellow-700 w-full"
        [ngStyle]="style"
      >
        <h3>Upload </h3>
      </app-botin>
   </div>

</div>
