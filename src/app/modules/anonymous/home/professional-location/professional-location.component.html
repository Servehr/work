<div 
   class='container mx-auto mt-1 md:mt-1 mb-7 flex-col md:flex'
>
    <div 
      class="w-12/12 md:w-12/12 px-2 py-1 md:p-5"
    >
      <p 
        class="text-gray-500 font-bold mb-5 -pl-2"
      >
        {{ title }}
      </p>
      

    <div
    >
    <!-- <app-alert 
      [statusCode]="statusCode" 
      [message]="message"
    >
    </app-alert> -->
    
    </div>
      <form 
          [formGroup]="searchProfessionalForm"
          class="flex flex-col space-y-5"
      >
         <div 
           class="flex"
         >
           <div 
              class="w-full"
           >                
             <app-select 
               #country
               [id]="'country'"  
               [name]="'country'"  
               [title]="'- Select Country -'"
               [options]="countries"
               formControlName="country" 
               [value]="value"
               [customErrorMessages]="errorMessages"
             >         
             </app-select>
           </div>
         </div>

          <div 
            class="flex flex-col space-y-1 text-gray-200"
          >
             <app-select 
               #state
               [id]="'state'"  
               [name]="'state'"  
               [title]="'- Select state -'"
               [options]="states"
               formControlName="state" 
               [value]="value"
               [customErrorMessages]="errorMessages"
             >         
             </app-select>
          </div>
          <p></p>
          <div
            class="flex justify-between items-center cursor-pointer"
          >
            <div
              (click)="closeModal()"
              class="bg-black px-6 py-4 rounded-md text-gray-200 hover:bg-gray-700"
            >
              Cancel 
            </div>
            <app-botin
              (ChangeOnButtonHoverIn)="ChangeOnButtonHoverIn()" 
              (ChangeOnButtonHoverOut)="ChangeOnButtonHoverOut()"
              (sendData)="writeState()"
              [style]="style"
              (click)="write()"
          >
            <div
              class="flex flex-col space-y-1 items-center justify-between"
            >
              @if(isLoading)
              {
                 <p class="font-bold text-white"> ... saving </p>
              }
              @if(!isLoading)
              {
                <h3>{{'Search'}} </h3>
              }
            </div>
           </app-botin>
          </div>
          

      </form>
   </div>



</div>
