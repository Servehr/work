<div
  class="bg-blue-50 px-5 pt-3 pb-3 md:py-7"
>
  <div 
    class='container mx-auto px-3 pt-3 py-4  md:p-10 flex-cols justify-center items-center'
  >
    <form 
      [formGroup]="skillSearchForm"
      class="flex flex-col space-y-5"
    >
      <div 
        class="w-full d-flex justify-content-between md:flex md:w-11/12 md:gap-0 mx-auto border-1 md:border-gray-200 md:rounded-full md:overflow-hidden"
      >
        <div 
          class="w-12/12 md:w-7/12 mb-2 md:mb-0"
        >
          <input-field
            [id]="'search'"
            #search
            [name]="'search'"
            [placeholder]="'e.g plumber'"
            [type]="'text'"
            [value]="''"
            formControlName="profession"
            [customErrorMessages]="errorMessages"
            [value]="''"
          >
          </input-field>
        </div>
        <div 
          class="w-12/12 md:w-5/12 mb-2 md:mb-0"
        >
          <app-select 
            #skillSearch 
            [options]="options"
            formControlName="location"
            [customErrorMessages]="errorMessages"
            (changedValue)="changedValue($event)"
          >         
          </app-select>

          <app-botin
            (ChangeOnButtonHoverIn)="ChangeOnButtonHoverIn()" 
            (ChangeOnButtonHoverOut)="ChangeOnButtonHoverOut()"

            </div>
          </app-botin>
        </div>  
      </div>

@if(isOpen())
{
  <app-modal 
    [isOpen]="isOpen()" 
    title="title" 
    [modalWidth]="modalWidth"
    (closeModal)="closeModal()"
    (confirmAction)="onConfirm()"
    
  >
      <app-professional-location
        (close)="closeModal()"
      >

  </app-modal>
}
