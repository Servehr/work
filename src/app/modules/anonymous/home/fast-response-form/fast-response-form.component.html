<div 
   class='container mx-auto mt-1 md:mt-1 mb-7 flex-col md:flex border-2 p-2 border-2 border-gray-400'
>
    <div 
      class="w-12/12 md:w-12/12 px-2 py-1 md:p-5"
    >
      <p 
        class="text-gray-500 font-bold mb-5 pl-2"
      >
        {{ 'Get Quick Response' }}
      </p>
      
    <form 
        [formGroup]="fastResponseForm"
        class="flex flex-col space-y-2 p-2"
    >
        <div 
            class="md:flex mb-1 gap-3"
        >
            <div 
                class="md:w-1/2 mb-3 md:mb-0"
            >
                <input-field
                    [id]="'firstname'"
                    #firstname
                    [name]="'firstname'"
                    [placeholder]="'Enter firstname'"
                    [type]="'text'"
                    [value]="''"
                    formControlName="firstname"
                    [customErrorMessages]="errorMessages"
                >
                </input-field>
            </div>
            <div 
                class="md:w-1/2 mb-2 md:mb-0"
            >
                <input-field
                    [id]="'surname'"
                    #surname
                    [name]="'surname'"
                    [placeholder]="'Enter surname'"
                    [type]="'text'"
                    [value]="''"
                    formControlName="surname"
                    [customErrorMessages]="errorMessages"
                >
                </input-field>
            </div>
        </div>

        <div 
            class="md:flex gap-3"
        >
            <div 
                class="md:w-1/2 mb-3 md:mb-0"
            >
                <input-field
                    [id]="'phone'"
                    #phone
                    [name]="'phone'"
                    [placeholder]="'Enter phone'"
                    [type]="'text'"
                    [value]="''"
                    formControlName="phone"
                    [customErrorMessages]="errorMessages"
                >
                </input-field>
            </div>
            <div 
                class="md:w-1/2"
            >
                <input-field
                    [id]="'email'"
                    #email
                    [name]="'email'"
                    [placeholder]="'Enter email'"
                    [type]="'text'"
                    [value]="''"
                    formControlName="email"
                    [customErrorMessages]="errorMessages"
                >
                </input-field>
            </div>
        </div>
        <div class="p-1"></div>
        <div 
          class="flex flex-col space-y-1 text-gray-200 mt-4"
        >
          <app-text-area  
            placeholder="Leave message here"
            [rows]="rows"
            [cols]="cols"
            formControlName="message"
            [customErrorMessages]="errorMessages"      
          >
          </app-text-area>            
          <!-- [value]="'glory'"  -->
        </div>
      <p></p> 
      <div 
        class="flex justify-between"
      >
        <app-botin
          class="bg-black p-2 rounded-md text-gray-200 hover:bg-gray-700"
        >
          <h3>Cancel </h3>
          </app-botin>
          <app-botin
            (ChangeOnButtonHoverIn)="ChangeOnButtonHoverIn()" 
            (ChangeOnButtonHoverOut)="ChangeOnButtonHoverOut()"
            (sendData)="write()"
            [style]="style"
          >
            <div
              class="flex flex-col space-y-1 items-center justify-between"
            >
              @if(isLoading())
              {
                 <p class="font-bold text-white"> ... sending </p>
              }
              @if(!isLoading())
              {
                <h3>Send</h3>
              }
            </div>
          </app-botin>
      </div>
    </form>

   </div>



</div>
