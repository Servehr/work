<div 
   class='container mx-auto pb-30 mt-1 md:mt-1 mb-20 md:shadow-md flex-col md:flex'
>
    <div 
      class="w-12/12 md:w-8/12 min:h-[350px] px-2 pb-40 py-1 md:p-5 pl-5 md:pl-10"
    >
      <p 
        class="text-gray-400 font-bold mb-5 -pl-2"
      >
        {{ title }}
      </p>
      
      <app-alert 
        [statusCode]="statusCode" 
        [message]="message"
      >
      </app-alert>

      <form 
        [formGroup]="registerForm"
        class="flex flex-col space-y-5"
    >

        <div 
          class="flex"
        >
          <div 
             class="w-full"
          >                
            <app-select 
              #category
              [id]="'category'"  
              [name]="'category'"  
              [title]="'- Select Category -'"
              [options]="categories"
              formControlName="category" 
              [value]="value"
              [customErrorMessages]="errorMessages"
            >         
            </app-select>
          </div>
        </div>

        <div 
            class="md:flex mb-3 gap-5"
        >
            <div 
                class="md:w-1/2 mb-4"
            >
                <input-field
                    [id]="'firstname'"
                    #firstname
                    [name]="'firstname'"
                    [placeholder]="'Enter firstname'"
                    [type]="'text'"
                    [value]="''"
                    formControlName="firstname"
                    [customErrorMessages]="errorMessages"
                >
                </input-field>
            </div>
            <div 
                class="md:w-1/2 mb-2"
            >
                <input-field
                    [id]="'surname'"
                    #surname
                    [name]="'surname'"
                    [placeholder]="'Enter surname'"
                    [type]="'text'"
                    [value]="''"
                    formControlName="surname"
                    [customErrorMessages]="errorMessages"
                >
                </input-field>
            </div>
        </div>

        <div 
            class="md:flex mb-3 gap-5"
        >
            <div 
                class="md:w-1/2 mb-4"
            >
                <input-field
                    [id]="'phone'"
                    #phone
                    [name]="'phone'"
                    [placeholder]="'Enter phone'"
                    [type]="'text'"
                    [value]="''"
                    formControlName="phone"
                    [customErrorMessages]="errorMessages"
                >
                </input-field>
            </div>
            <div 
                class="md:w-1/2 mb-2"
            >
                <input-field
                    [id]="'email'"
                    #email
                    [name]="'email'"
                    [placeholder]="'Enter email'"
                    [type]="'text'"
                    [value]="''"
                    formControlName="email"
                    [customErrorMessages]="errorMessages"
                >
                </input-field>
            </div>
        </div>

        <div 
            class="md:flex mb-3 gap-5"
        >
            <div 
                class="md:w-1/2 mb-4"
            >
                <input-field
                    [id]="'password'"
                    #password
                    [name]="'password'"
                    [placeholder]="'Enter password'"
                    [type]="'password'"
                    [value]="''"
                    formControlName="password"
                    [customErrorMessages]="errorMessages"
                >
                </input-field>
            </div>
            <div 
                class="md:w-1/2 mb-2"
            >
                <input-field
                    [id]="'cPassword'"
                    #password
                    [name]="'cPassword'"
                    [placeholder]="'Retype password'"
                    [type]="'password'"
                    [value]="''"
                    formControlName="cPassword"
                    [customErrorMessages]="errorMessages"
                >
                </input-field>
            </div>
        </div>

        <div 
            class="w-full flex justify-between mx-auto gap-10"
        >
          <div 
            class="w-full md:w-4/12"
          >
            <app-image-upload
              (sendFile)="saveFile($event, 'passport')"
            >
              <p 
                class="text-gray-500 text-sm"
              >
                Upload Passport Photograph
              </p>
            </app-image-upload>
          </div>

          <div 
            class="w-full md:w-4/12"
          >
            <app-image-upload                
              (sendFile)="saveFile($event, 'nin')"
            >
              <p 
                class="text-gray-500 text-sm"
              >
                Upload NIN
              </p>
            </app-image-upload>
          </div>
        </div>
        

        <div
           class="md:flex z-30 mb-5"
        >
          <app-botin
            (ChangeOnButtonHoverIn)="ChangeOnButtonHoverIn()" 
            (ChangeOnButtonHoverOut)="ChangeOnButtonHoverOut()"
            (sendData)="register()"
            [disabled]="disabled"
            [style]="style"
          >
              <div
                class="flex flex-col space-y-1 items-center justify-between"
              >
                @if(!isLoading())
                {
                   <p class="font-bold text-white"> ... submitting </p>
                }
                @if(isLoading())
                {
                  <h3>Register</h3>
                }

              </div>
          </app-botin>
        </div>

        <div 
          class="flex flex-col space-x-2 justify-content-between mt-10 z-30"
        >
          <div 
            class="flex gap-5 px-1 mt-5"
          >
            <a 
              [routerLink]="['/auth/login']" 
              class="text-sm text-gray-600 -mt-2 mb-3 hover:text-green-700 hover:font-bold"
            >
              Login
            </a>
            <a 
              [routerLink]="['/auth/forgot']" 
              class="text-sm text-gray-600 -mt-2 mb-3 hover:text-green-700 hover:font-bold"
            >
              Forgot
            </a>
          </div>
        </div>
        
      </form>

   </div>


   <div 
      class="w-12/12 md:w-4/12 px-2 py-1 md:p-5"
   >

   </div>



</div>
